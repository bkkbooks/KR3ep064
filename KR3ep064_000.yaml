苦丹一粒純鉤鉤三錢歸尾一錢五分西河柳切二錢澤蘭一錢四味煎湯代水化丸均兩次服小姐八月廿一日邪傳血室少腹陣痛痛甚症塊上升氣塞肢麻發厥神志時清時渾胸悶欲泛疹㾦色暗膚紫唇青脈亂舌尖絳此熱陷厥陰勢屬危篤防慮汗脫不測勉方以候高才政用淡豆豉三錢川楝子一錢五分大荊芥一錢五分制香附二錢炙延胡一錢五分朱茯神三錢兩頭尖布包四分茺蔚子三錢小茴香炒四分另用囫圇蘇梗一根囫圇烏藥一個囫圇枳實一枚囫圇檳榔一枚直沉香六分五味用熱水各磨四五分光景白開水沖服小姐八月廿二日病涉兩候邪伏不達熱傳血室小腹痞塊升痛甚則肢楚痙厥膚乏華光脘腹膨脹小溲不利氣粗吸短脈遲濡數舌尖絳根白膩此係邪襲厥少兩陰經之象況衝任之脈隸於陽明陽明熱鬱不達殊為棘手防今明兩日厥脫不測勉方以候高才政淡黃芩川桂枝三分同炒一錢五分淨桃仁五分炒枳實二錢制川樸一錢瓜蔞實三錢姜山梔一錢五分兩頭尖一錢五分加枳實導滯丸包三錢推車客四隻小姐八月廿三日大腑雖通未暢中脘未舒少腹陣痛痛甚則痞升厥逆四肢麻冷唇青面出油汗肌乏瑩光白㾦密布色暗脈形濡細而數舌根膩尖絳齒焦口臭恙今半月身熱未解病中適值經行兼以情懷抑鬱邪不外達熱乘血室殊屬危篤防有厥脫不測勉擬疏解和營兼通腑為先錄方是否祈請高才政黑豆卷三錢元明粉五分大腹皮淨三錢淨桃仁七分火麻仁三錢淡黃芩川桂枝三分同炒一錢五分製大黃後下三錢炒枳實一錢五分全瓜蔞炒三錢兩頭尖五分加推車客五隻姜竹茹二錢小姐八月廿五日痙厥漸平熱仍未解病今十有七天神志時清時渾

body:
  text: 正文案朱象兄年三十五歲道光丁酉十一月十四日在施長順沙船診冬溫感邪身熱經月餘未解脈形滑數舌色灰燥帶膩中脘未寬挾食中焦蒙阻寒邪未解痰多喘咳膜原未化營衛未清神色昏迷譫語症非輕視擬泄風通里淡豆豉三錢鮮生地六錢象貝去心三錢炒知母一錢瓜蔞全炒三錢火麻仁三錢淡芩一錢冬桑葉一錢五分焦山梔二錢加二青竹茹三錢薑汁炒活水蘆根八錢案浦大兄吳淞南門外不計日患久哮喘數年有餘時發時止肺胃感寒而發咳嗽痰多氣逆脈形浮滑舌滑帶膩此係肺胃受寒即發擬泄風清肺主治蜜炙麻黃三分象貝母去心二錢旋覆花絹包二錢杏仁霜三錢粉甘草四分桑白皮蜜炙三錢代赭石煅二錢杜蘇子三錢白前一錢加銀杏七枚案浦良兄吳淞脾氣時發疼痛不休每遇怒氣或受寒氣內擾胸中刺痛以致上氣厥逆擬開鬱定痛川鬱金一錢炒白芍一錢五分赤苓一錢高良薑八分制香附二錢炒枳殼一錢烏藥一錢熟半夏一錢五分青皮一錢加白蔻研四分案朱大兄吳淞胃脘作痛已有數年時常噁心嘔吐清水手按之疼痛略減此係蟲痛喜按用烏梅丸合二陳湯主治桂枝尖三分瓜蔞全炒三錢白蔻仁研四分廣皮一錢九香蟲一錢製半夏一錢五分乾薑淡五分烏梅一個雲茯苓三錢加薑汁炒二青竹茹三錢鮮橘葉七片案王七爺陝西莊客瘍瘡未愈毒入內攻初覺齒浮頭脹周身骨節舉動即痛乃因服倒提餘毒未清收入臟腑上攻喉腫腐爛黏痰甚多脈形滑數舌色腫厚帶膩而疼此係毒入內傳症屬險患擬清涼化毒加減主治另用紫雪丹五分搽舌川黃連五分山豆根一錢白嘉蠶炒三錢甘中黃研一錢煨石膏五錢土貝母研三錢牡丹皮一錢五分鮮生地一兩加活水蘆根一兩竹葉二十片第二方服後喉中熱氣衝出甚憂略減上稍已收仍用紫雪丹五分搽舌川黃連另煎沖五分生石膏五錢金銀花五錢真西黃沖服五分山豆根一錢鮮生地一兩五錢淨連翹三錢甘中黃一錢土貝母研三錢加活水蘆根一兩竹葉二十片第三方毒氣稍減喉腐略退仍宜前方加減鮮生地一兩生石膏八錢山豆根一錢元參三錢甘中黃一錢川黃連另煎服五分連翹二錢天花粉三錢真西黃沖服五分加淨銀花五錢竹葉二十片第四方前進十去其五數天大便如以又有用生軍如其大便到後去生軍再進五劑生軍三錢鮮首烏八錢甘中黃一錢木通一錢炒黃柏一錢五分金銀花五錢川貝殼去心研三錢天花粉三錢真川連另煎沖四分加土茯苓四兩煎湯代水第五方前方所服清火化毒連進約有十劑而愈時在丁酉十月初病愈再服涼血清火降毒十劑全瘳生地五錢白蘚皮二錢金銀花五錢炒黃柏一錢龍膽草二錢炒黃芩一錢川連四分黑山梔二錢加土茯苓四兩煎湯代水案哺年五歲嬰孩肺風痰喘氣逆上壅脈形遲澀舌苔帶滑膩兼之面浮四肢腫滿腹脹如箕陰囊水腫光亮脾胃之土受邪運行之官失職木不能榮金無取主以致上逆痰壅症非輕恙如小舟重載暫擬葶藶湯加減主治候高明先生裁酌旋覆花絹包二錢牛蒡子研一錢五分生桑皮炙三錢甜葶藶一錢萊菔子三錢赤茯苓四錢澤瀉二錢飛滑石三錢杜蘇子三錢加大腹絨二錢冬瓜子三錢第二方因前進二劑喘息稍定四肢面浮略為收退陰囊微有皺紋仍擬前方去葶藶一味加川牛膝二錢瓜蔞皮三錢豬苓四錢第三方又前進二劑喘氣略平面浮已退四肢減去其五陰囊全瘳旋覆花絹包二錢赤苓四錢冬瓜皮三錢粉豬苓四錢瓜蔞皮四錢川牛膝二錢新會皮一錢片通二錢生桑白二錢加姜皮三分第四方川萆薢二錢葫蘆巴煨二錢福澤瀉二錢片通一錢川牛膝二錢新會皮一錢五分薏苡仁四錢粉豬苓四錢生桑皮三錢冬瓜皮炒三錢第五方焦冬朮一錢五分新會皮一錢五分霍山斛三錢川椒目二分川牛膝一錢土茯苓三錢瓜蔞皮炒三錢福澤瀉二錢薏苡仁四錢加煨姜皮三分第六方脹滿喘息已愈擬健脾化濕之劑西黨參二錢制於術一錢雲茯苓三錢霍石斛三錢川椒目二分淮山藥三錢新會皮一錢五分薏苡仁四錢加紅棗三枚煨姜皮三分案吉云太史在荊樂堂內生綿耆二錢銀花五錢白蘚皮二錢鮮首烏六錢地膚子三錢川連另煎沖四分生石膏四錢炒嘉蠶三錢甘中黃一錢加土茯苓四兩煎湯代水案徐老益太太新閘飲冷凝寒經閉忽血之症炒鬆生地四錢歸炭一錢五分焦冬朮一錢五分白朮一錢五分制洋參二錢澤蘭一錢遠志炭五分萸肉一錢五分蒸女貞子三錢加陳棕炭三錢案大南門內王家弄養浩堂孟大奶氣虛喘逆心血不足臥寐少安咳嗽實因肺虛擬補氣養血候政西黨參四錢生地四錢大熟地五錢遠志炭五分陳阿膠四錢麥冬三錢牡丹皮一錢五分赤茯神三錢肥玉竹三錢加胡桃肉連衣隔二枚案老閘王安吉娘娘冬溫感寒病涉兩候身熱神昏多語脈形滑數舌色帶灰氣食感寒內伏症屬沉重恐防邪陷宜辛涼通滯法候翁政用羚羊片一錢五分鮮生地六錢知母一錢乾葛一錢淡豆豉三錢全瓜蔞炒四錢枳殼炒一錢連翹二錢黑山梔一錢加活水蘆根一兩前進身熱少減大便欲解前方加火麻仁研四錢黑玄參二錢黃芩炒一錢第二方前進辛涼通滯劑冬溫邪熱內伏神識昏蒙脈形細數舌燥而紅目赤寤寐少安大小便未行症屬棘手防其昏陷變端仍宜清燥化熱通滯主治淡豆豉三錢知母一錢五分連翹二錢黃芩炒一錢羚羊片二錢花粉三錢枳實炒一錢五分鮮生地六錢瓜蔞仁炒四錢加活水蘆根一兩元明粉沖服三錢服後大便未行明日加黑山梔二錢丹皮一錢五分天竺黃一錢案李姓四肢麻木畏風所侵經絡濕痰流於肌膚營衛血氣不克周流化痰和血通絡舒經祛風治之候政當歸二錢明天麻煨一錢新會皮炒一錢海風藤二錢杜仲三錢十大功勞二錢絲瓜絡一錢五分姜半夏一錢木瓜一錢加九制棉花核二錢酒炒桑枝四錢案周大兄忽患喉閉腫脹飲食不下風火相傳兼之脾胃之火蒸於腎脈循於喉嚨內氣一弱水火不濟宜清火散腫為主大力子炒二錢荊芥一錢五分射干一錢枳殼一錢嫩前胡一錢五分貝母研二錢馬勃六分桔梗一錢粉甘草六分加薄荷葉後入六分案錢大兄風熱相傳乃成痄腮兼之頭疼清陽不升肌體發熱外感寒乃風易所入舌苔微白口乾作飲宜疏風退熱驅邪止渴消腫之法嫩前胡二錢荊芥穗一錢五分杏仁研三錢蔓荊子一錢黑山梔一錢五分嫩防風一錢五分乾葛一錢葉蘇梗一錢赤茯苓二錢加蔥白頭一個案顧小姐赤遊風毒漸漸發滿遊走無定身熱煩躁甚則須防毒氣內攻逆閉驚厥其勢荊棘慎之慎之暫擬涼血解毒清熱一法其方呈政烏犀角磨沖二分鮮生地二錢當歸尾八分鮮石斛三錢大連翹一錢五分人中黃一錢黑山梔一錢五分西赤芍一錢車前子炒一錢五分金銀花二錢加燈心全吉另用冰硼散一兩用芭蕉根汁調塗患處第二方犀角尖一錢粉丹皮一錢鮮生地二錢西赤芍一錢人中黃一錢大連翹一錢五分黑山梔一錢土貝母去心三錢大豆卷一錢五分加赤茯苓三錢燈心一吉竹葉二十片嫩鉤鉤四錢後下第三方牛蒡子炒一錢杏仁研三錢土貝母去心二錢橘紅八分嘉蠶五分荊芥一錢連翹一錢五分桔梗三分薄荷泡三分熟楂三錢加人中黃一錢西河柳二錢第四方嫩前胡一錢大杏仁去皮尖二錢海浮石二錢左牡蠣煅三錢土貝母去心三錢馬勃包五分新會皮去白一錢白桔梗二分法半夏一錢五分連翹一錢加甘草節三分炒楂三錢制嘉蠶一錢案王姓氣逆喘哮火灼乘金言語不續肺氣受邪六脈浮洪舌色乾燥津液不足標本失運水不制火肝經獨旺以致火炎上喘擬抑火清金定喘降氣為主南沙參二錢杏仁霜三錢瓜蔞仁炒三錢白前一錢馬兜鈴二錢揀麥冬去心二錢桑白皮蜜炙三錢玄參二錢杜蘇子炒三錢加胡桃肉連衣隔二枚甜葶藶一錢案曹姓風熱上傳頭面遊風麻癢如蟲行之狀皆因食後冒風脾胃熱達宜疏風治之鮮首烏四錢荊芥一錢五分蟬衣一錢土貝母去心二錢刺蒺藜去刺二錢嘉蠶炒一錢五分當歸二錢蘇薄荷六分生桑皮一錢五分川連另煎沖四分加豨薟葉三錢案娘娘患久痿症已愈氣血大虧遍體身疼骨楚脈虛舌滑四肢痠軟肝血不足血少筋枯宜養血榮筋佐治之全當歸二錢海風藤三錢小撫芎四分宣木瓜一錢五分五加皮一錢五分淮牛膝二錢刺蒺藜去刺二錢廣橘絡一錢原紅花四分加豨薟草四錢嫩桑枝酒炒四錢案小姐病久元虛脾淺不足六脈細軟舌色紅燥津液大虧咳嗽干嗆無痰土衰火旺納穀少思肝血不足症非輕視患久已成怯患之虞宜扶脾滋陰抑水丹溪法治之候高明裁政制冬朮二錢薏苡仁四錢川石斛四錢懷山藥三錢制洋參二錢廣橘白一錢五分地骨皮三錢奎白朮炒一錢五分炙鱉甲三錢加蜜炙枇杷葉三錢刷毛服後好些改方加肥玉竹三錢蒸女貞子三錢紫丹參一錢五分案小姐傅思堂毛胃熱上衝時發牙漏血出不止擬清心降火止血而治鎊犀角先煎六分川貝母去心研二錢元參三錢茜草二錢揀麥冬去心二錢淡芩炒一錢丹皮一錢黑山梔二錢鮮生地五錢加鮮茅根去心六錢藕節五枚案孫姓失血後咳嗆音啞脈來細軟舌色虛滑納穀少思木旺土衰脾陽失運得飲即吐擬泄肝養脾清肺之法南沙參三錢香穀芽三錢雲苓三錢霍山石斛二錢新會皮一錢薏苡仁四錢川貝母去心一錢五分焦山梔二錢懷山藥三錢加藕節三枚案胡老大正月二十九日診濕熱疫邪身熱未解頭疼骨痛神識昏蒙症非輕視防發疹斑脈洪舌膩宜疏肌透解治之候政淡豆豉三錢赤苓三錢蟬衣淨一錢焦楂肉三錢粉葛根一錢荊芥一錢五分杏仁去皮尖研三錢炒牛蒡子三錢炒枳實一錢五分加佛手柑五分昨進疏肌透解之劑疫邪一候身熱未退脈來浮數舌色黃膩神煩頭暈遍體骨楚此係溫熱未化仍擬疏肌透解柴胡炒建曲淡豆豉青蒿陳皮炒枳殼益元散乾葛荊芥加佛手柑五分鮮荷葉一張案毛姓胃火上升牙宣出血兼之腐白唇燥口渴擬清胃辛涼法酒炒川連另煎沖五分板藍根鮮生地連翹粉丹皮三錢生石膏元參人中黃犀角尖磨沖六分加活水蘆根一兩捲心竹葉二十針案陳老大疫邪旬日畏寒身熱未解脈形弦滑舌色白膩中脘未寬嘔惡黏痰此係濕熱內蘊未清症非輕視防其增劇擬溫膽解和法加二青竹茹鹽水炒二錢柴胡五分全瓜蔞二錢廣皮一錢枳實炒一錢粉丹皮一錢五分赤苓三錢熟半夏一錢五分廣藿一錢五分川連另煎沖五分淡豆豉三錢昨進初進溫膽之劑身熱未退脈象形弦舌苔黃膩胸脘稍寬嘔惡未減此係疫邪未楚症屬較重仍宜加減治之候政柴胡五分知母一錢枳實炒一錢黑山梔二錢粉葛根一錢甘草四分赤苓三錢黃連五分熟半夏一錢五分二青竹茹鹽水炒二錢案謝先生咳嗆已久氣逆上衝真陰失守金受火邪以致干嗆無痰此係肝強脾弱胃不納穀擬健脾開胃滋陰症非輕視咳久恐成怯之患耳南沙參二錢真川貝去心二錢青蒿子一錢麥冬去心三錢枇杷葉刷毛蜜炙三錢紫菀茸一錢五分肥玉竹四錢生蛤殼三錢燕菜三錢炙鱉甲三錢案朱松鶴在廣福寺南鶴膝風十大功勞葉三錢海風藤三錢淮牛膝二錢金毛狗脊三錢酒洗全當歸二錢千年健二錢仙靈脾二錢川獨活二錢鹽水炒宣木瓜二錢加酒炒桑枝四錢松節一個案朱松鶴在廣福寺南鶴膝風十大功勞八錢海風藤三錢千年健二錢全當歸酒洗二錢宣木瓜鹽水炒二錢仙靈脾二錢淮牛膝二錢川獨活